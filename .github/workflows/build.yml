name: Build Vantage PMS

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Vantage.PMS.csproj

      - name: Build
        run: dotnet build Vantage.PMS.csproj --configuration Release --no-restore
